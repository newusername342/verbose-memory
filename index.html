<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cowork Tasks">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; manifest-src 'self'; worker-src 'self'; connect-src 'self'; form-action 'none'; base-uri 'none'; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Cowork Tasks</title>
</head>
<body>
  <div class="app">
    <header>
      <h1><span>Cowork</span> Tasks</h1>
      <div class="header-actions">
        <button class="icon-btn" data-action="sync" title="Import/Export">&#8645;</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card active">
        <div class="number" id="stat-active">0</div>
        <div class="label">Active</div>
      </div>
      <div class="stat-card">
        <div class="number" id="stat-total">0</div>
        <div class="label">Total</div>
      </div>
      <div class="stat-card done">
        <div class="number" id="stat-done">0</div>
        <div class="label">Done</div>
      </div>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="high">High Priority</button>
      <button class="filter-btn" data-filter="medium">Medium</button>
      <button class="filter-btn" data-filter="low">Low</button>
    </div>

    <div class="task-list" id="task-list"></div>

    <button class="fab">+</button>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2 id="modal-title">New Task</h2>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="task-title-input" placeholder="What needs to be done?" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="task-desc" placeholder="Additional details..." autocomplete="off"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select id="task-priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="task-category" placeholder="e.g. work, personal" autocomplete="off">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="save-btn">Add Task</button>
        <button type="button" class="btn btn-danger hidden" id="delete-btn">Delete Task</button>
      </form>
    </div>
  </div>

  <!-- Sync Modal -->
  <div class="modal-overlay" id="sync-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Import / Export</h2>
      <p class="sync-description">
        Copy your tasks as JSON to transfer between devices, or paste JSON from another device to import.
      </p>
      <div class="sync-area">
        <textarea id="sync-data" placeholder="Paste task JSON here to import..." autocomplete="off"></textarea>
      </div>
      <div class="sync-actions">
        <button class="btn btn-secondary" data-action="export">Export</button>
        <button class="btn btn-primary" data-action="import">Import</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
