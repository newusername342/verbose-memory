<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude Chat">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self'; connect-src 'self' https://api.anthropic.com; form-action 'none'; base-uri 'none'; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>Claude Chat - Unlimited Uploads</title>
</head>
<body>
  <div class="app">
    <header>
      <h1><span>Claude</span> Chat</h1>
      <div class="header-actions">
        <button class="icon-btn" id="settings-btn" title="Settings">&#9881;</button>
        <button class="icon-btn" id="new-chat-btn" title="New Chat">&#10010;</button>
      </div>
    </header>

    <div class="chat-messages" id="chat-messages">
      <div class="welcome-state" id="welcome">
        <div class="welcome-icon">&#9993;</div>
        <h2>Chat with Claude</h2>
        <p>Upload files of any size. Text files are sent as content, images as base64. No upload limits.</p>
      </div>
    </div>

    <div class="file-preview-bar" id="file-preview-bar"></div>

    <div class="chat-input-area">
      <div class="input-row">
        <label class="upload-btn" title="Attach files">
          <input type="file" id="file-input" multiple hidden>
          &#128206;
        </label>
        <textarea id="message-input" placeholder="Message Claude..." rows="1" autocomplete="off"></textarea>
        <button class="send-btn" id="send-btn" title="Send" disabled>&#9654;</button>
      </div>
      <div class="input-hint">
        <span id="model-indicator">claude-sonnet-4-20250514</span>
        &middot; Files are read locally, no upload limits
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Settings</h2>
      <form id="settings-form">
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
          <div class="field-hint">Your key is stored locally and sent directly to Anthropic's API.</div>
        </div>
        <div class="form-group">
          <label>Model</label>
          <select id="model-select">
            <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (default)</option>
            <option value="claude-opus-4-20250514">Claude Opus 4</option>
            <option value="claude-haiku-4-20250514">Claude Haiku 4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Tokens</label>
          <input type="number" id="max-tokens-input" value="8192" min="1" max="128000" autocomplete="off">
        </div>
        <div class="form-group">
          <label>System Prompt (optional)</label>
          <textarea id="system-prompt-input" placeholder="You are a helpful assistant..." autocomplete="off"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Settings</button>
        <button type="button" class="btn btn-danger" id="clear-data-btn">Clear All Data</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
